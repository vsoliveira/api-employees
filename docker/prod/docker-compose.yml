services:
  postgres:
    image: postgres:15-alpine
    container_name: employees-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-employees_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # NOTE: In production, don't expose port - use internal networking only
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-employees_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - employees-network
    restart: always
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-prod
    # NOTE: In production, don't expose ports - reverse proxy handles external access
    # ports:
    #   - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    networks:
      - employees-network
    depends_on:
      - postgres
    restart: always
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-prod
    # NOTE: In production, don't expose ports - reverse proxy handles external access
    # ports:
    #   - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost}
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data_prod:/var/lib/grafana
    networks:
      - employees-network
    depends_on:
      - prometheus
    restart: always
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: employees-api-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      API_KEY: ${API_KEY}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-http://jaeger:14250}
    # NOTE: In production, don't expose port - reverse proxy handles external access
    # ports:
    #   - "${APP_PORT:-8080}:8080"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - employees-network
    restart: always
    security_opt:
      - no-new-privileges:true
    # Set memory and CPU limits for production safety
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  employees-network:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
  prometheus_data_prod:
    driver: local
  grafana_data_prod:
    driver: local
