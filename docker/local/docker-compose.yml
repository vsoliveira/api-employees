services:
  postgres:
    image: postgres:15-alpine
    container_name: employees-db-local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-employees_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-employees_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - employees-network

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: employees-api-local
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/employees_db
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      API_KEY: ${API_KEY:-local-dev-key}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - employees-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  employees-network:
    driver: bridge

volumes:
  postgres_data_local:
    driver: local
