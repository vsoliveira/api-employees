global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'employees-api'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/api/actuator/prometheus'
    scrape_interval: 5s
