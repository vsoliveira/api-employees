services:
  postgres:
    image: postgres:15-alpine
    container_name: employees-db-stage
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-employees_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_stage:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-employees_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - employees-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-stage
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_stage:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - employees-network
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-stage
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data_stage:/var/lib/grafana
    networks:
      - employees-network
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-stage
    ports:
      - "${JAEGER_GRPC_PORT:-6831}:6831/udp"
      - "${JAEGER_UI_PORT:-16686}:16686"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - employees-network

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: employees-api-stage
    environment:
      SPRING_PROFILES_ACTIVE: stage
      DATABASE_HOST: postgres
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      API_KEY: ${API_KEY:-stage-api-key}
      JAEGER_ENDPOINT: http://jaeger:14250
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - employees-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

networks:
  employees-network:
    driver: bridge

volumes:
  postgres_data_stage:
    driver: local
  prometheus_data_stage:
    driver: local
  grafana_data_stage:
    driver: local
