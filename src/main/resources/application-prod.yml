# Production Profile - Hardened Configuration
spring:
  application:
    name: employees-api
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:5432/employees_db
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    locations: classpath:db/migration
    baselineOnMigrate: false
    validate-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

api:
  key: ${API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
      base-path: /api/actuator
  endpoint:
    health:
      show-details: when-authorized
    shutdown:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    jaeger:
      grpc:
        endpoint: ${JAEGER_ENDPOINT:http://jaeger:14250}
      enabled: true

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.company: INFO
  pattern:
    console: "%d{ISO8601} %5p [%t] %c{1.} : %m%n"
