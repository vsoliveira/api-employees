# Staging Profile - Production-like PostgreSQL
spring:
  application:
    name: employees-api
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:5432/employees_db
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    locations: classpath:db/migration
    baselineOnMigrate: true

server:
  port: 8080
  servlet:
    context-path: /api

api:
  key: ${API_KEY:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    jaeger:
      grpc:
        endpoint: http://jaeger:14250
      enabled: true

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: WARN
    com.company: INFO
